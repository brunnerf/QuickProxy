name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action to run"
        required: true
        default: apply
        type: choice
        options:
          - apply
          - destroy
      replace_instance:
        description: "Force EC2 instance replacement"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write   # required for OIDC token exchange
  contents: read

env:
  TF_DIR: terraform
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # validate — runs on every push / PR, no AWS credentials needed
  # ---------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform init (no backend)
        run: terraform init -backend=false -input=false
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform fmt check
        run: terraform fmt -check
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform validate
        run: terraform validate
        working-directory: ${{ env.TF_DIR }}

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: tflint init
        run: tflint --init
        working-directory: ${{ env.TF_DIR }}

      - name: tflint
        run: tflint
        working-directory: ${{ env.TF_DIR }}

      - name: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_DIR }}
          quiet: true
          soft_fail: false

  # ---------------------------------------------------------------------------
  # plan — runs on main branch, needs production environment for secrets
  # ---------------------------------------------------------------------------
  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Write backend config
        run: |
          cat > backend.hcl <<EOF
          bucket  = "${{ secrets.STATE_BUCKET }}"
          region  = "${{ secrets.AWS_REGION }}"
          key     = "proxy/terraform.tfstate"
          encrypt = true
          EOF

      - name: Terraform init
        run: terraform init -backend-config=../backend.hcl -input=false
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform plan
        run: terraform plan -input=false
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_vpc_cidr: "10.0.0.0/16"
          TF_VAR_github_repo: "brunnerf/QuickProxy"
          TF_VAR_additional_public_keys: ${{ secrets.ADDITIONAL_PUBLIC_KEYS }}

  # ---------------------------------------------------------------------------
  # apply — manual trigger only (workflow_dispatch on main)
  # ---------------------------------------------------------------------------
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Write backend config
        run: |
          cat > backend.hcl <<EOF
          bucket  = "${{ secrets.STATE_BUCKET }}"
          region  = "${{ secrets.AWS_REGION }}"
          key     = "proxy/terraform.tfstate"
          encrypt = true
          EOF

      - name: Terraform init
        run: terraform init -backend-config=../backend.hcl -input=false
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform apply
        run: |
          REPLACE_FLAG=""
          if [ "${{ github.event.inputs.replace_instance }}" = "true" ]; then
            REPLACE_FLAG="-replace=aws_instance.proxy"
          fi
          terraform apply -auto-approve -input=false $REPLACE_FLAG
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_vpc_cidr: "10.0.0.0/16"
          TF_VAR_github_repo: "brunnerf/QuickProxy"
          TF_VAR_additional_public_keys: ${{ secrets.ADDITIONAL_PUBLIC_KEYS }}

  # ---------------------------------------------------------------------------
  # destroy — manual trigger only, requires action == destroy
  # ---------------------------------------------------------------------------
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.event.inputs.action == 'destroy'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Write backend config
        run: |
          cat > backend.hcl <<EOF
          bucket  = "${{ secrets.STATE_BUCKET }}"
          region  = "${{ secrets.AWS_REGION }}"
          key     = "proxy/terraform.tfstate"
          encrypt = true
          EOF

      - name: Terraform init
        run: terraform init -backend-config=../backend.hcl -input=false
        working-directory: ${{ env.TF_DIR }}

      - name: Terraform destroy
        run: terraform destroy -auto-approve -input=false
        working-directory: ${{ env.TF_DIR }}
        env:
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
          TF_VAR_vpc_cidr: "10.0.0.0/16"
          TF_VAR_github_repo: "brunnerf/QuickProxy"
          TF_VAR_additional_public_keys: ${{ secrets.ADDITIONAL_PUBLIC_KEYS }}
