name: Terraform

on:
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      region:
        description: "Terraform root to target"
        required: true
        type: choice
        options:
          - global
          - eu-central-1
          - eu-west-2
          - us-east-1
      action:
        description: "Terraform action to run"
        required: true
        default: apply
        type: choice
        options:
          - apply
          - destroy
      replace_instance:
        description: "Force EC2 instance replacement (ignored for global)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  id-token: write   # required for OIDC token exchange
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # validate — runs on every push / PR, no AWS credentials needed
  # Loops across all roots: fmt and checkov recurse; init/validate/tflint loop
  # ---------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform/

      - name: Terraform init + validate (all roots)
        run: |
          for dir in terraform/global terraform/eu-central-1 terraform/eu-west-2 terraform/us-east-1; do
            echo "=== $dir ==="
            terraform -chdir=$dir init -backend=false -input=false
            terraform -chdir=$dir validate
          done

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: tflint (all roots)
        run: |
          for dir in terraform/global terraform/eu-central-1 terraform/eu-west-2 terraform/us-east-1; do
            echo "=== $dir ==="
            tflint --init --chdir=$dir
            tflint --chdir=$dir
          done

      - name: checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          quiet: true
          soft_fail: false

  # ---------------------------------------------------------------------------
  # plan — runs on main branch; region must be specified for manual triggers
  # ---------------------------------------------------------------------------
  plan:
    name: Plan (${{ github.event.inputs.region || 'push' }})
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          aws-region: ${{ inputs.region == 'global' && 'eu-west-1' || inputs.region || 'eu-west-1' }}

      - name: Write backend config
        run: |
          cat > backend.hcl <<EOF
          bucket  = "${{ secrets.STATE_BUCKET }}"
          region  = "${{ secrets.STATE_BUCKET_REGION }}"
          key     = "proxy/${{ inputs.region || 'push-validate' }}/terraform.tfstate"
          encrypt = true
          EOF

      - name: Terraform init
        run: terraform init -backend-config=../../backend.hcl -input=false
        working-directory: terraform/${{ inputs.region || 'global' }}

      - name: Terraform plan
        run: terraform plan -input=false
        working-directory: terraform/${{ inputs.region || 'global' }}
        env:
          TF_VAR_github_repo: ${{ secrets.GITHUB_REPO }}
          TF_VAR_additional_public_keys: ${{ secrets.ADDITIONAL_PUBLIC_KEYS }}

  # ---------------------------------------------------------------------------
  # apply — manual trigger only (workflow_dispatch on main)
  # ---------------------------------------------------------------------------
  apply:
    name: Apply (${{ github.event.inputs.region }})
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.event.inputs.action == 'apply'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          aws-region: ${{ inputs.region == 'global' && 'eu-west-1' || inputs.region }}

      - name: Write backend config
        run: |
          cat > backend.hcl <<EOF
          bucket  = "${{ secrets.STATE_BUCKET }}"
          region  = "${{ secrets.STATE_BUCKET_REGION }}"
          key     = "proxy/${{ inputs.region }}/terraform.tfstate"
          encrypt = true
          EOF

      - name: Terraform init
        run: terraform init -backend-config=../../backend.hcl -input=false
        working-directory: terraform/${{ inputs.region }}

      - name: Terraform apply
        run: |
          REPLACE_FLAG=""
          if [ "${{ inputs.replace_instance }}" = "true" ] && [ "${{ inputs.region }}" != "global" ]; then
            REPLACE_FLAG="-replace=module.proxy.aws_instance.proxy"
          fi
          terraform apply -auto-approve -input=false $REPLACE_FLAG
        working-directory: terraform/${{ inputs.region }}
        env:
          TF_VAR_github_repo: ${{ secrets.GITHUB_REPO }}
          TF_VAR_additional_public_keys: ${{ secrets.ADDITIONAL_PUBLIC_KEYS }}

  # ---------------------------------------------------------------------------
  # destroy — manual trigger only, requires action == destroy
  # ---------------------------------------------------------------------------
  destroy:
    name: Destroy (${{ github.event.inputs.region }})
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && github.event.inputs.action == 'destroy'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ROLE_ARN }}
          aws-region: ${{ inputs.region == 'global' && 'eu-west-1' || inputs.region }}

      - name: Write backend config
        run: |
          cat > backend.hcl <<EOF
          bucket  = "${{ secrets.STATE_BUCKET }}"
          region  = "${{ secrets.STATE_BUCKET_REGION }}"
          key     = "proxy/${{ inputs.region }}/terraform.tfstate"
          encrypt = true
          EOF

      - name: Terraform init
        run: terraform init -backend-config=../../backend.hcl -input=false
        working-directory: terraform/${{ inputs.region }}

      - name: Terraform destroy
        run: terraform destroy -auto-approve -input=false
        working-directory: terraform/${{ inputs.region }}
        env:
          TF_VAR_github_repo: ${{ secrets.GITHUB_REPO }}
          TF_VAR_additional_public_keys: ${{ secrets.ADDITIONAL_PUBLIC_KEYS }}
